<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>WomenClub Admin</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <div class="admin-dashboard">



        <!-- =========================
CHAT LIST
========================= -->

        <aside class="admin-users">


            <header class="admin-header">


                <div class="admin-avatar">

                    W

                </div>


                <div>

                    <h2>
                        Global Hub
                    </h2>

                    <p>
                        Admin Dashboard
                    </p>

                </div>


            </header>




            <div class="search-box">

                <input id="searchUsers" placeholder="Search conversations...">

            </div>




            <div id="usersList" class="users-list">


                <div class="empty">

                    Waiting for messages...

                </div>


            </div>



        </aside>









        <!-- =========================
ADMIN CHAT WINDOW
========================= -->


        <section class="admin-chat">



            <header class="admin-chat-header">


                <div class="customer-profile">



                    <div class="customer-avatar">

                        <img id="customerImage" src="https://i.pravatar.cc/100?img=52">

                    </div>




                    <div>


                        <h3 id="customerName">

                            Select Conversation

                        </h3>


                        <span id="customerPhone">

                            No chat selected

                        </span>



                    </div>



                </div>



            <div class="admin-actions">
            
                <button id="payUserBtn" class="pay-user-btn">
            
                    💳 Pay User
            
                </button>
            
                <span>⋮</span>
            
            </div>
            
            <!-- PAY USER OVERLAY -->
            
            <div id="payUserOverlay" class="pay-user-overlay">
            
                <div class="pay-user-card">
            
                    <h2>
            
                        Pay User
            
                    </h2>
            
                    <p>
            
                        Select Amount
            
                    </p>
            
                    <div class="currency-tabs">
            
                        <button class="currency active" data-currency="USD" data-rate="1500">
            
                            USD $
            
                        </button>
            
                        <button class="currency" data-currency="EUR" data-rate="1760">
            
                            EUR €
            
                        </button>
            
                        <button class="currency" data-currency="GBP" data-rate="2040">
            
                            GBP £
            
                        </button>
            
                    </div>

            <div id="amountGrid" class="amount-grid">
            
                <button data-value="100">$100.00</button>
            
                <button data-value="200">$200.00</button>
            
                <button data-value="300">$300.00</button>
            
                <button data-value="400">$400.00</button>
            
                <button data-value="500">$500.00</button>
            
                <button data-value="6500">$6,500.00</button>
            
                <button data-value="7000">$7,000.00</button>
            
                <button data-value="10000">$10,000.00</button>
            
                <button data-value="11000">$11,000.00</button>
            
            </div>
            
                    <div class="pay-actions">
            
                        <button id="cancelPay">
            
                            Cancel
            
                        </button>
            
                        <button id="sendPayment">
            
                            Send
            
                        </button>
            
                    </div>
            
                </div>
            
            </div>



            </header>







            <div id="adminMessages" class="admin-messages">



                <div class="empty-chat">

                </div>



            </div>
            <footer class="admin-input-area">



                <div class="message-box">

                    <button class="emoji-btn">

                        ☺

                    </button>

                    <input id="adminMessageInput" placeholder="Reply message..." autocomplete="off">



                </div>




                <button id="adminSend">

                    ➤

                </button>



            </footer>






        </section>





    </div>

    <script type="module" src="admin.js"></script>

</body>

</html>
